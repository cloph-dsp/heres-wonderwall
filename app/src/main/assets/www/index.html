<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Here's Wonderwall</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2a;--primary:#bb86fc;--text:#e1e1e1;--text2:#999;--error:#cf6679;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
header{padding:20px 20px 4px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:20px;font-weight:600;color:var(--primary)}
header .sub{font-size:11px;color:var(--text2)}
.badge{font-size:10px;background:var(--surface2);padding:2px 8px;border-radius:10px;color:var(--text2)}
.btn-group{display:flex;gap:12px;padding:8px 20px 16px}
.btn{flex:1;padding:16px;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.btn:active{opacity:.7}
.btn-primary{background:var(--primary);color:#000}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn .icon{font-size:26px}
.btn .label{font-size:11px;font-weight:400;opacity:.7}
.btn:disabled{opacity:.4;cursor:default}
.recording-banner{display:none;align-items:center;gap:12px;padding:12px 20px;margin:0 20px 12px;background:#3a1a1a;border:1px solid #5a2a2a;border-radius:var(--radius)}
.recording-banner.active{display:flex}
.rec-dot{width:12px;height:12px;border-radius:50%;background:#ef5350;animation:pulse 1s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.rec-banner-text{flex:1;font-size:14px;font-weight:500}
.rec-banner-text .sub{font-size:11px;color:var(--text2);font-weight:400}
.rec-stop-btn{padding:8px 16px;border:none;border-radius:8px;background:#ef5350;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.rec-stop-btn:active{opacity:.7}
.section{padding:4px 20px 4px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
#results{flex:1;padding:4px 20px 80px}
.result-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.result-card .title{font-size:15px;font-weight:600}
.result-card .meta{font-size:12px;color:var(--text2);margin:6px 0}
.result-card .chord-line{font-size:13px;font-family:monospace;color:var(--primary);margin-top:8px;line-height:1.6;white-space:pre-wrap}
.result-card .actions{display:flex;gap:8px;margin-top:12px}
.result-card .actions button{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;cursor:pointer;background:var(--surface2);color:var(--text)}
.result-card .actions button:active{opacity:.7}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.empty-state .big-icon{font-size:56px;opacity:.3}
.empty-state p{color:var(--text2);font-size:14px;line-height:1.5}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--primary);color:#000;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;z-index:99;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>

<header>
<div>
<h1>Here's Wonderwall</h1>
<div class="sub">Chord Analyzer</div>
</div>
<span class="badge" id="appStatus">standalone</span>
</header>

<div class="btn-group">
<button class="btn btn-primary" id="pickBtn" onclick="pickAudio()">
<span class="icon">🎵</span>
<span class="label">Pick Audio File</span>
</button>
<button class="btn btn-secondary" id="recBtn" onclick="toggleRecord()">
<span class="icon" id="recIcon">🎤</span>
<span class="label" id="recLabel">Record Guitar</span>
</button>
</div>

<div class="recording-banner" id="recBanner">
<div class="rec-dot"></div>
<div class="rec-banner-text">
Recording... <span class="sub" id="recTimer">00:00</span>
</div>
<button class="rec-stop-btn" onclick="toggleRecord()">■ Stop</button>
</div>

<div class="section" id="resultsLabel">Saved Analyses</div>
<div id="results">
<div class="empty-state" id="emptyState">
<div class="big-icon">🎸</div>
<p>No analyses yet.<br>Pick an audio file or record your guitar to get started.</p>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
const bridge = window.AndroidBridge;
const isApp = !!bridge;
let analyses = loadLocal();
let recording = false;
let recTimer = null;
let recSeconds = 0;

document.getElementById('appStatus').textContent = isApp ? 'app mode' : 'browser preview';
document.getElementById('appStatus').style.background = isApp ? 'var(--primary)' : 'var(--surface2)';
document.getElementById('appStatus').style.color = isApp ? '#000' : 'var(--text2)';

function pickAudio() {
if (bridge) { bridge.pickAudio(); showToast('Opening file picker...'); }
else { showToast('App mode only'); }
}

function toggleRecord() {
if (recording) {
stopRecording();
} else {
startRecording();
}
}

function startRecording() {
if (recording) return;
recording = true;
recSeconds = 0;

document.getElementById('recIcon').textContent = '⏹';
document.getElementById('recLabel').textContent = 'Stop';
document.getElementById('recBtn').className = 'btn btn-primary';
document.getElementById('recBanner').classList.add('active');
document.getElementById('pickBtn').disabled = true;

if (bridge) {
bridge.startRecording();
recTimer = setInterval(() => {
recSeconds++;
const m = String(Math.floor(recSeconds / 60)).padStart(2, '0');
const s = String(recSeconds % 60).padStart(2, '0');
document.getElementById('recTimer').textContent = m + ':' + s;
}, 1000);
}
}

function stopRecording() {
if (!recording) return;
recording = false;
clearInterval(recTimer);
recTimer = null;

document.getElementById('recIcon').textContent = '🎤';
document.getElementById('recLabel').textContent = 'Record Guitar';
document.getElementById('recBtn').className = 'btn btn-secondary';
document.getElementById('recBanner').classList.remove('active');
document.getElementById('pickBtn').disabled = false;

if (bridge) {
bridge.stopRecording();
showToast('Recording stopped!');
}

// Android native will fire window.__audioRecorded({uri, name}) when done
}

function showToast(msg) {
const t = document.getElementById('toast');
t.textContent = msg;
t.classList.add('show');
setTimeout(() => t.classList.remove('show'), 2500);
}

function loadLocal() {
try {
const raw = localStorage.getItem('analyses');
return raw ? JSON.parse(raw) : [];
} catch(e) { return []; }
}

function saveLocal(arr) {
localStorage.setItem('analyses', JSON.stringify(arr));
}

function render() {
const container = document.getElementById('results');
const empty = document.getElementById('emptyState');
const label = document.getElementById('resultsLabel');

if (analyses.length === 0) {
container.innerHTML = '';
container.appendChild(empty);
empty.classList.remove('hidden');
label.textContent = 'Saved Analyses';
return;
}

empty.classList.add('hidden');
label.textContent = 'Saved Analyses (' + analyses.length + ')';

container.innerHTML = analyses.map(a => {
const chords = a.chords || a.chordsJson || '';
return '<div class="result-card">' +
'<div class="title">' + escHtml(a.title || 'Analysis') + '</div>' +
(a.artist ? '<div class="meta">' + escHtml(a.artist) + '</div>' : '') +
'<div class="meta">' + escHtml(a.key || '?') + ' \u00b7 ' + (a.bpm || '?') + ' BPM \u00b7 ' + new Date(a.cachedAt).toLocaleDateString() + '</div>' +
(chords ? '<div class="chord-line">' + escHtml(chords) + '</div>' : '') +
'<div class="actions">' +
'<button onclick="shareAnalysis(\'' + escHtml(a.videoId) + '\')">\ud83d\udce4 Share</button>' +
'<button onclick="deleteAnalysis(\'' + escHtml(a.videoId) + '\')">\ud83d\uddd1 Delete</button>' +
'</div>' +
'</div>';
}).join('');
}

function escHtml(s) {
const d = document.createElement('div');
d.textContent = s;
return d.innerHTML;
}

function shareAnalysis(id) {
const a = analyses.find(x => x.videoId === id);
if (!a) return;
const chords = a.chords || a.chordsJson || '';
const text = (a.title || 'Analysis') + (a.artist ? ' - ' + a.artist : '') + '\n' +
'Key: ' + (a.key || '?') + ' \u00b7 ' + (a.bpm || '?') + ' BPM\n' +
'Chords: ' + chords;
if (bridge) { bridge.shareText(text, a.title || 'Chords'); }
else { showToast(text.substring(0, 40) + '...'); }
}

function deleteAnalysis(id) {
analyses = analyses.filter(x => x.videoId !== id);
saveLocal(analyses);
render();
if (bridge) showToast('Deleted');
}

// Expose saveAnalysis for AndroidBridge calls
window.__saveAnalysis = function(json) {
analyses.push(json);
saveLocal(analyses);
render();
showToast('Analysis saved!');
};

// Audio recorded callback from native
window.__audioRecorded = function(json) {
showToast('Audio captured: ' + (json.name || 'recording'));
};

// Audio picked callback from native
window.__audioPicked = function(json) {
showToast('File selected: ' + (json.name || 'audio'));
};

document.addEventListener('DOMContentLoaded', () => {
render();
});
</script>
</body>
</html>
